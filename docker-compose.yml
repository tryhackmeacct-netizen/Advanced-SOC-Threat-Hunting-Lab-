version: '3.8'
services:
  mongo:
    image: mongo:6.0
    container_name: asthl_mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db

  opensearch:
    image: opensearchproject/opensearch:2.8.0
    container_name: asthl_opensearch
    environment:
      - discovery.type=single-node
      - cluster.name=opensearch-cluster
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.8.0
    container_name: asthl_opensearch_dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
    ports:
      - 5601:5601

  backend:
    build:
      context: ./backend
    container_name: asthl_backend
    depends_on:
      - mongo
      - opensearch
    environment:
      - MONGO_URI=mongodb://mongo:27017/asthl
      - OPENSEARCH_URL=http://opensearch:9200
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
  opensearch_data:
